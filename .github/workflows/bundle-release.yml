name: Bundle Release

on:
  workflow_run:
    workflows:
      - CI Build
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bundle-release-main
  cancel-in-progress: false

jobs:
  version-gate:
    name: Check release version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      ${{
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main'
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          github.ref == 'refs/heads/main'
        )
      }}
    outputs:
      release_needed: ${{ steps.version.outputs.release_needed }}
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_sha: ${{ steps.version.outputs.release_sha }}

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Validate version metadata
        id: version
        env:
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const { execFileSync } = require('node:child_process');

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const tauriConfig = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          const cargoToml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          const cargoVersionMatch = cargoToml.match(/^version\s*=\s*"([^"]+)"/m);

          if (!cargoVersionMatch) {
            throw new Error('Unable to read version from src-tauri/Cargo.toml');
          }

          const version = tauriConfig.version;
          const projectVersions = {
            'src-tauri/tauri.conf.json': version,
            'package.json': packageJson.version,
            'src-tauri/Cargo.toml': cargoVersionMatch[1]
          };

          const mismatches = Object.entries(projectVersions)
            .filter(([, value]) => value !== version)
            .map(([name, value]) => `${name}=${value}`);

          if (mismatches.length > 0) {
            throw new Error(`Project versions are not aligned with src-tauri/tauri.conf.json=${version}: ${mismatches.join(', ')}`);
          }

          if (!/^\d+\.\d+\.\d+$/.test(version)) {
            throw new Error(`Version must use X.Y.Z format before creating a release tag: ${version}`);
          }

          const tagName = `v${version}`;
          let releaseNeeded = 'true';

          try {
            execFileSync('git', ['ls-remote', '--exit-code', '--tags', 'origin', `refs/tags/${tagName}`], { stdio: 'ignore' });
            releaseNeeded = 'false';
            console.log(`Release tag ${tagName} already exists; skipping bundle release.`);
          } catch {
            console.log(`Release tag ${tagName} does not exist; bundle release will run.`);
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `release_needed=${releaseNeeded}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag_name=${tagName}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `release_sha=${process.env.RELEASE_SHA}\n`);
          NODE

  build-macos:
    name: Build macOS ${{ matrix.name }}
    needs: version-gate
    runs-on: macos-15
    timeout-minutes: 90
    if: needs.version-gate.outputs.release_needed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Apple Silicon
            target: aarch64-apple-darwin
            artifact_suffix: arm64
          - name: Intel
            target: x86_64-apple-darwin
            artifact_suffix: intel
    env:
      CI: true
      APP_VERSION: ${{ needs.version-gate.outputs.version }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.version-gate.outputs.release_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25.8.1
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: src-tauri -> target
          shared-key: release-macos-${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Apple signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/mediaflow-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/mediaflow-signing.keychain-db"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"

          printf '%s' "$APPLE_CERTIFICATE" | base64 -D -o "$CERTIFICATE_PATH"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$API_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "APPLE_API_KEY_PATH=${API_KEY_PATH}" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"

      - name: Build signed app bundle
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Collect release asset
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          DMG_PATH=$(find "$BUNDLE_DIR/dmg" -name '*.dmg' -print -quit)
          APP_PATH=$(find "$BUNDLE_DIR/macos" -maxdepth 1 -name '*.app' -print -quit)

          test -n "$DMG_PATH"
          test -n "$APP_PATH"

          mkdir -p release-assets
          RELEASE_DMG="release-assets/MediaFlow_${APP_VERSION}_macos_${{ matrix.artifact_suffix }}.dmg"
          cp "$DMG_PATH" "$RELEASE_DMG"

          echo "APP_PATH=${APP_PATH}" >> "$GITHUB_ENV"
          echo "DMG_PATH=${RELEASE_DMG}" >> "$GITHUB_ENV"

      - name: Notarize and staple DMG
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait

          xcrun stapler staple "$DMG_PATH"

      - name: Verify code signing and notarization
        run: |
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl -a -vv --type exec "$APP_PATH"

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediaflow-macos-${{ matrix.artifact_suffix }}
          path: release-assets/*.dmg
          if-no-files-found: error

      - name: Cleanup signing assets
        if: always()
        run: |
          rm -f "$APPLE_API_KEY_PATH"
          security delete-keychain "$KEYCHAIN_PATH" || true

  publish-release:
    name: Publish GitHub Release
    needs:
      - version-gate
      - build-macos
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: needs.version-gate.outputs.release_needed == 'true'
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG_NAME: ${{ needs.version-gate.outputs.tag_name }}
      RELEASE_SHA: ${{ needs.version-gate.outputs.release_sha }}

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.version-gate.outputs.release_sha }}
          fetch-depth: 0

      - name: Download macOS release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: mediaflow-macos-*
          merge-multiple: true

      - name: Create release tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG_NAME" > /dev/null 2>&1; then
            echo "Release tag $TAG_NAME already exists; leaving it unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" "$RELEASE_SHA" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Create GitHub release
        run: |
          if gh release view "$TAG_NAME" > /dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "MediaFlow $TAG_NAME"
          else
            gh release create "$TAG_NAME" --title "MediaFlow $TAG_NAME" --generate-notes
          fi

      - name: Upload release assets
        run: |
          gh release upload "$TAG_NAME" release-assets/*.dmg --clobber
