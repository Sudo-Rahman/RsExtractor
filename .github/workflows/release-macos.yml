name: Release macOS

on:
  push:
    branches:
      - 'codex/release-updater-test'
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-macos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-macos:
    runs-on: macos-latest
    env:
      CI: true
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install FFmpeg
        run: |
          brew update
          brew install ffmpeg

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate version metadata
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          fs.appendFileSync(process.env.GITHUB_ENV, `APP_VERSION=${packageJson.version}\n`);

          const gitRefType = process.env.GITHUB_REF_TYPE;
          const gitRefName = process.env.GITHUB_REF_NAME;
          const tauriConfig = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          const cargoToml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          const cargoVersionMatch = cargoToml.match(/^version\s*=\s*"([^"]+)"/m);

          if (!cargoVersionMatch) {
            throw new Error('Unable to read version from src-tauri/Cargo.toml');
          }

          const projectVersions = {
            packageJson: packageJson.version,
            tauriConfig: tauriConfig.version,
            cargoToml: cargoVersionMatch[1]
          };

          const uniqueVersions = [...new Set(Object.values(projectVersions))];
          if (uniqueVersions.length !== 1) {
            const details = Object.entries(projectVersions).map(([name, value]) => `${name}=${value}`).join(', ');
            throw new Error(`Project versions are not aligned: ${details}`);
          }

          if (gitRefType === 'tag') {
            const tagVersion = gitRefName.replace(/^v/, '');
            if (tagVersion !== packageJson.version) {
              throw new Error(`Tagged version ${tagVersion} does not match project version ${packageJson.version}`);
            }
          }
          NODE

      - name: Prepare Apple signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/mediaflow-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/mediaflow-signing.keychain-db"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"

          printf '%s' "$APPLE_CERTIFICATE" | base64 -D -o "$CERTIFICATE_PATH"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$API_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "APPLE_API_KEY_PATH=${API_KEY_PATH}" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"

      - name: Run frontend checks
        run: pnpm check

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build signed universal app
        run: pnpm tauri build --target universal-apple-darwin

      - name: Collect release assets
        run: |
          DMG_PATH=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' -print -quit)
          UPDATER_TAR_PATH=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -name '*.app.tar.gz' -print -quit)
          UPDATER_SIG_PATH=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -name '*.app.tar.gz.sig' -print -quit)
          APP_PATH=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)

          test -n "$DMG_PATH"
          test -n "$UPDATER_TAR_PATH"
          test -n "$UPDATER_SIG_PATH"
          test -n "$APP_PATH"

          echo "APP_PATH=${APP_PATH}" >> "$GITHUB_ENV"
          echo "DMG_PATH=${DMG_PATH}" >> "$GITHUB_ENV"
          echo "UPDATER_TAR_PATH=${UPDATER_TAR_PATH}" >> "$GITHUB_ENV"
          echo "UPDATER_SIG_PATH=${UPDATER_SIG_PATH}" >> "$GITHUB_ENV"
          echo "UPDATER_TAR_NAME=$(basename "$UPDATER_TAR_PATH")" >> "$GITHUB_ENV"

      - name: Notarize and staple DMG
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait

          xcrun stapler staple "$DMG_PATH"

      - name: Verify code signing and notarization
        run: |
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl -a -vv --type exec "$APP_PATH"

      - name: Ensure GitHub release exists
        if: github.ref_type == 'tag'
        run: |
          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "MediaFlow $GITHUB_REF_NAME"
          else
            gh release create "$GITHUB_REF_NAME" --title "MediaFlow $GITHUB_REF_NAME" --generate-notes
          fi

      - name: Export release notes
        if: github.ref_type == 'tag'
        run: |
          gh release view "$GITHUB_REF_NAME" --json body --jq '.body' > "$RUNNER_TEMP/release-notes.md"

          if [[ ! -s "$RUNNER_TEMP/release-notes.md" ]] || [[ -z "$(tr -d '[:space:]' < "$RUNNER_TEMP/release-notes.md")" ]]; then
            echo "Release $GITHUB_REF_NAME" > "$RUNNER_TEMP/release-notes.md"
          fi

      - name: Generate updater manifest
        if: github.ref_type == 'tag'
        run: |
          node ./scripts/generate-updater-manifest.mjs \
            --version "$APP_VERSION" \
            --pub-date "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            --signature-file "$UPDATER_SIG_PATH" \
            --url "https://github.com/Sudo-Rahman/RsExtractor/releases/download/$GITHUB_REF_NAME/$UPDATER_TAR_NAME" \
            --target "macos-universal" \
            --output "$RUNNER_TEMP/latest.json"

      - name: Upload release assets
        if: github.ref_type == 'tag'
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            "$DMG_PATH" \
            "$UPDATER_TAR_PATH" \
            "$UPDATER_SIG_PATH" \
            "$RUNNER_TEMP/latest.json" \
            --clobber

      - name: Upload branch test artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: mediaflow-macos-universal-${{ github.sha }}
          path: |
            ${{ env.DMG_PATH }}
            ${{ env.UPDATER_TAR_PATH }}
            ${{ env.UPDATER_SIG_PATH }}

      - name: Cleanup signing assets
        if: always()
        run: |
          rm -f "$APPLE_API_KEY_PATH"
          security delete-keychain "$KEYCHAIN_PATH" || true
