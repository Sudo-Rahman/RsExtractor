name: CI Build

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    uses: ./.github/workflows/ci-linux.yml

  macos:
    uses: ./.github/workflows/ci-macos.yml

  windows:
    uses: ./.github/workflows/ci-windows.yml
