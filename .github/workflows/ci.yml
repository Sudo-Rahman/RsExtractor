name: CI Build

on:
  push:
    branches:
      - main
      - codex/**

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-22.04
          - os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            ocl-icd-opencl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ffmpeg
      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ffmpeg -y

      - name: Setup OpenCL SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sdkVersion = 'v2025.07.23'
          $archivePath = Join-Path $env:RUNNER_TEMP "OpenCL-SDK-$sdkVersion-Win-x64.zip"
          $extractRoot = Join-Path $env:RUNNER_TEMP 'opencl-sdk'
          $downloadUrl = "https://github.com/KhronosGroup/OpenCL-SDK/releases/download/$sdkVersion/OpenCL-SDK-$sdkVersion-Win-x64.zip"

          Invoke-WebRequest -Uri $downloadUrl -OutFile $archivePath
          Expand-Archive -Path $archivePath -DestinationPath $extractRoot -Force

          $sdkDir = Get-ChildItem -Path $extractRoot -Directory | Select-Object -First 1
          if (-not $sdkDir) {
            throw 'OpenCL SDK extraction failed: root directory not found.'
          }

          $includeDir = Join-Path $sdkDir.FullName 'include'
          $libDir = Join-Path $sdkDir.FullName 'lib'
          $binDir = Join-Path $sdkDir.FullName 'bin'
          $openclLib = Join-Path $libDir 'OpenCL.lib'

          if (-not (Test-Path $openclLib)) {
            throw "OpenCL SDK setup failed: missing $openclLib"
          }

          "OpenCL_INCLUDE_DIR=$includeDir" >> $env:GITHUB_ENV
          "OpenCL_LIBRARY=$openclLib" >> $env:GITHUB_ENV
          "CMAKE_PREFIX_PATH=$($sdkDir.FullName);$env:CMAKE_PREFIX_PATH" >> $env:GITHUB_ENV
          "LIB=$libDir;$env:LIB" >> $env:GITHUB_ENV
          $binDir >> $env:GITHUB_PATH

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify FFmpeg tools
        run: |
          ffmpeg -version
          ffprobe -version

      - name: Run Rust tests (macOS)
        if: runner.os == 'macOS'
        working-directory: src-tauri
        run: |
          cargo test
          cargo test evermeet_release_endpoints_are_reachable -- --ignored

      - name: Run Rust tests (Linux)
        if: matrix.os == 'ubuntu-22.04'
        working-directory: src-tauri
        run: |
          cargo test --no-default-features --features ocr-backend-opencl
          cargo test --no-default-features --features ocr-backend-opencl btbn_latest_page_contains_download_url_for_current_supported_variant -- --ignored

      - name: Run Rust tests (Windows)
        if: runner.os == 'Windows'
        working-directory: src-tauri
        run: |
          cargo test --no-default-features --features ocr-backend-opencl
          cargo test --no-default-features --features ocr-backend-opencl btbn_latest_page_contains_download_url_for_current_supported_variant -- --ignored

      - name: Build Tauri app (macOS)
        if: runner.os == 'macOS'
        run: pnpm tauri build

      - name: Build Tauri app (Linux/Windows OpenCL)
        if: runner.os != 'macOS'
        run: pnpm tauri build -- --no-default-features --features ocr-backend-opencl
