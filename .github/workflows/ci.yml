name: CI Build

on:
  push:
    branches:
      - main
      - codex/ffmpeg-in-bundle
      - codex/test-bundle-release

permissions:
  contents: read

jobs:
  linux:
    uses: ./.github/workflows/ci-linux.yml

  macos:
    uses: ./.github/workflows/ci-macos.yml

  windows:
    uses: ./.github/workflows/ci-windows.yml
